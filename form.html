<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Moovers — Instant Moving Quote</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    :root {
      /* Moovers palette */
      --bg: #f5f5f5;            /* page background — light gray */
      --surface: #ffffff;       /* bot bubbles, cards */
      --border: #e1e8ee;        /* subtle blue-gray border */
      --text: #15679b;          /* primary dark blue */
      --text-muted: #6b8aa5;    /* muted blue-gray */
      --accent: #448cca;        /* secondary medium blue */
      --user-bg: #15679b;       /* user bubble — dark blue */
      --user-text: #f5f5f5;     /* user text — light gray */
      --total: #15679b;         /* final total — dark blue */
      --shadow-card: 0 10px 25px rgba(21, 103, 155, 0.08);
      --shadow-hover: 0 15px 25px rgba(41, 81, 106, 0.18);
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0; padding: 0;
      background: var(--bg); color: var(--text);
      font-family: 'Manrope', system-ui, Arial, sans-serif;
      font-size: 14px;
      font-weight: 500;
      -webkit-font-smoothing: antialiased;
    }
    .chat {
      max-width: 560px;
      margin: 0 auto;
      padding: 24px 24px 80px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      min-height: 70vh;
    }
    html.embedded .chat {
      padding-bottom: 24px;
      min-height: 0;
    }
    .bubble {
      max-width: 80%;
      padding: 14px 20px;
      border-radius: 20px;
      line-height: 1.5;
      font-family: 'Manrope', sans-serif;
      font-size: 14px;
      font-weight: 500;
      animation: slideUp 250ms ease-out both;
    }
    .bubble.bot {
      align-self: flex-start;
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      border-bottom-left-radius: 6px;
      box-shadow: var(--shadow-card);
    }
    .bubble.user {
      align-self: flex-end;
      background: var(--user-bg);
      color: var(--user-text);
      border-bottom-right-radius: 6px;
      font-weight: 600;
    }
    .typing {
      align-self: flex-start;
      padding: 14px 20px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      border-bottom-left-radius: 6px;
      display: inline-flex;
      gap: 4px;
      animation: slideUp 250ms ease-out both;
      box-shadow: var(--shadow-card);
    }
    .typing span {
      width: 6px; height: 6px; border-radius: 50%;
      background: var(--accent);
      animation: pulse 1.2s ease-in-out infinite;
    }
    .typing span:nth-child(2) { animation-delay: 0.15s; }
    .typing span:nth-child(3) { animation-delay: 0.3s; }
    @keyframes pulse {
      0%, 80%, 100% { opacity: 0.3; }
      40% { opacity: 1; }
    }
    @keyframes slideUp {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .input-area {
      align-self: stretch;
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 4px;
      animation: slideUp 250ms ease-out both;
    }
    .choice-btn {
      padding: 10px 20px;
      background: var(--surface);
      color: var(--accent);
      border: 2px solid var(--border);
      border-radius: 15px;
      font-family: 'Manrope', sans-serif;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all 200ms ease-in-out;
    }
    .choice-btn:hover {
      background: var(--text);
      color: var(--bg);
      border-color: var(--text);
      box-shadow: var(--shadow-hover);
    }
    .choice-btn.selected {
      background: var(--text);
      color: var(--bg);
      border-color: var(--text);
    }
    .text-input {
      flex: 1; min-width: 280px;
      padding: 12px 18px;
      border: 2px solid var(--border);
      background: var(--surface);
      font-family: 'Manrope', sans-serif;
      font-size: 14px;
      font-weight: 500;
      color: var(--text);
      border-radius: 15px;
      outline: none;
      transition: border-color 200ms ease-in-out;
    }
    .text-input:focus { border-color: var(--accent); }
    .autocomplete {
      position: relative;
      flex: 1;
      min-width: 280px;
    }
    .autocomplete .suggestions {
      position: absolute;
      top: 100%;
      left: 0; right: 0;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 15px;
      margin-top: 6px;
      max-height: 240px;
      overflow-y: auto;
      z-index: 10;
      box-shadow: var(--shadow-hover);
    }
    .autocomplete .suggestions div {
      padding: 10px 18px;
      cursor: pointer;
      font-size: 13px;
      color: var(--text);
    }
    .autocomplete .suggestions div:hover,
    .autocomplete .suggestions div.focused { background: var(--bg); }
    .submit-btn {
      padding: 10px 22px;
      background: var(--text);
      color: var(--bg);
      border: 2px solid var(--text);
      border-radius: 15px;
      font-family: 'Manrope', sans-serif;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all 200ms ease-in-out;
    }
    .submit-btn:hover {
      background: var(--accent);
      border-color: var(--accent);
      box-shadow: var(--shadow-hover);
    }
    .calendar {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 18px;
      width: 100%;
      max-width: 320px;
      box-shadow: var(--shadow-card);
    }
    .cal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 14px;
    }
    .cal-title {
      font-family: 'Manrope', sans-serif;
      font-size: 15px;
      font-weight: 700;
      color: var(--text);
    }
    .cal-nav {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      width: 32px;
      height: 32px;
      cursor: pointer;
      color: var(--text);
      font-size: 16px;
      line-height: 1;
      font-family: 'Manrope', sans-serif;
      font-weight: 600;
      transition: all 200ms ease-in-out;
    }
    .cal-nav:hover:not(:disabled) { background: var(--text); color: var(--bg); border-color: var(--text); }
    .cal-nav:disabled { opacity: 0.3; cursor: not-allowed; }
    .cal-weekdays {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 2px;
      margin-bottom: 4px;
    }
    .cal-weekdays div {
      text-align: center;
      font-family: 'Manrope', sans-serif;
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      color: var(--text-muted);
      letter-spacing: 0.05em;
      padding: 4px 0;
    }
    .cal-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 2px;
    }
    .cal-day {
      background: transparent;
      border: none;
      aspect-ratio: 1;
      border-radius: 10px;
      cursor: pointer;
      font-family: 'Manrope', sans-serif;
      font-size: 13px;
      font-weight: 600;
      color: var(--text);
      font-variant-numeric: tabular-nums;
      transition: background 150ms, color 150ms;
    }
    .cal-day.blank { cursor: default; }
    .cal-day:not(.blank):not(:disabled):not(.selected):hover { background: var(--bg); }
    .cal-day:disabled { color: var(--text-muted); opacity: 0.35; cursor: not-allowed; }
    .cal-day.selected { background: var(--user-bg); color: var(--user-text); }
    .cal-wrap {
      display: flex;
      flex-direction: column;
      gap: 14px;
      align-items: flex-start;
    }
    .cal-submit {
      padding: 10px 22px;
      background: var(--text);
      color: var(--bg);
      border: 2px solid var(--text);
      border-radius: 15px;
      font-family: 'Manrope', sans-serif;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all 200ms ease-in-out;
    }
    .cal-submit:hover:not(:disabled) {
      background: var(--accent);
      border-color: var(--accent);
      box-shadow: var(--shadow-hover);
    }
    .cal-submit:disabled { opacity: 0.3; cursor: not-allowed; }
    .result {
      margin-top: 32px;
      padding: 36px 28px;
      text-align: center;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 25px;
      box-shadow: var(--shadow-card);
      animation: slideUp 400ms ease-out both;
    }
    .result .label {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--text-muted);
    }
    .result .total {
      font-family: 'Manrope', sans-serif;
      font-weight: 800;
      font-size: clamp(28px, 8vw, 44px);
      letter-spacing: -0.02em;
      color: var(--total);
      margin: 8px 0 24px;
      font-variant-numeric: tabular-nums;
      white-space: nowrap;
    }
    .result hr {
      border: 0;
      border-top: 1px solid var(--border);
      margin: 16px auto;
      max-width: 320px;
    }
    .breakdown {
      max-width: 360px;
      margin: 0 auto;
      font-variant-numeric: tabular-nums;
    }
    .breakdown .row {
      display: flex;
      justify-content: space-between;
      padding: 6px 0;
      font-size: 14px;
      font-weight: 500;
    }
    .breakdown .row .lbl { color: var(--text-muted); font-weight: 500; }
    .breakdown .row strong { font-weight: 700; }
    .disclaimer {
      margin-top: 24px;
      font-size: 12px;
      color: var(--text-muted);
      font-weight: 500;
    }
    .start-over {
      display: inline-block;
      margin-top: 20px;
      color: var(--accent);
      text-decoration: underline;
      cursor: pointer;
      font-size: 13px;
      font-weight: 600;
    }
    .start-over:hover { color: var(--text); }
    .phone-capture {
      margin: 28px auto 0;
      max-width: 420px;
      padding: 22px 24px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 18px;
      text-align: left;
    }
    .phone-capture h3 {
      margin: 0 0 6px;
      font-family: 'Manrope', sans-serif;
      font-size: 15px;
      font-weight: 700;
      color: var(--text);
    }
    .phone-capture p {
      margin: 0 0 14px;
      font-size: 12px;
      color: var(--text-muted);
      font-weight: 500;
      line-height: 1.5;
    }
    .phone-form {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    .phone-form .text-input {
      flex: 1;
      min-width: 180px;
    }
    .phone-error {
      margin-top: 10px;
      font-size: 12px;
      color: #b91c1c;
      font-weight: 600;
    }
    .phone-success {
      font-size: 13px;
      color: var(--text);
      font-weight: 600;
      line-height: 1.55;
    }
    .phone-success strong { color: var(--accent); font-weight: 700; }

    /* ── Mobile ── */
    @media (max-width: 640px) {
      .chat { padding: 16px 12px 80px; }
      .bubble { max-width: 90%; padding: 12px 16px; }
      .text-input { min-width: 0; }
      .autocomplete { min-width: 0; }
      .calendar { max-width: 100%; }
      .result { padding: 24px 16px; }
      .phone-capture { padding: 16px; }
    }
  </style>
</head>
<body>
  <div class="chat" id="chat"></div>

  <script type="module">
    import { calculateQuote, distanceMiles, CONFIG } from './pricing.js';

    const chatEl = document.getElementById('chat');
    const answers = {};

    // --- UI primitives ---
    function appendBubble(role, text) {
      const div = document.createElement('div');
      div.className = `bubble ${role}`;
      div.textContent = text;
      chatEl.appendChild(div);
      scrollToBottom();
      return div;
    }
    function appendTyping() {
      const div = document.createElement('div');
      div.className = 'typing';
      for (let i = 0; i < 3; i++) {
        div.appendChild(document.createElement('span'));
      }
      chatEl.appendChild(div);
      scrollToBottom();
      return div;
    }
    function appendInputArea() {
      const div = document.createElement('div');
      div.className = 'input-area';
      chatEl.appendChild(div);
      scrollToBottom();
      return div;
    }
    function scrollToBottom() {
      if (window.parent !== window) return; // iframe: parent page scrolls, not us
      window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
    }
    function delay(ms) { return new Promise(r => setTimeout(r, ms)); }
    async function botSay(text, typingMs = 600) {
      const t = appendTyping();
      await delay(typingMs);
      t.remove();
      return appendBubble('bot', text);
    }

    // --- Conversation engine ---
    const STEPS = [
      {
        id: 'size',
        botText: "Hi! I'll help you get a quick moving quote. What size is your current home?",
        input: 'buttons',
        options: [
          { value: 'studio', label: 'Studio' },
          { value: '1br', label: '1 BR' },
          { value: '2br', label: '2 BR' },
          { value: '3br', label: '3 BR' },
          { value: '4br', label: '4+ BR' },
        ],
      },
      {
        id: 'origin',
        botText: "Got it. What's the pickup address?",
        input: 'address',
      },
      {
        id: 'originFloor',
        botText: "Which floor is the pickup on, and is there an elevator?",
        input: 'buttons',
        options: [
          { value: 'ground', label: 'Ground floor' },
          { value: '2-3-elev', label: '2nd–3rd, elevator' },
          { value: '2-3-no-elev', label: '2nd–3rd, no elevator' },
          { value: '4+-elev', label: '4th+, elevator' },
          { value: '4+-no-elev', label: '4th+, no elevator' },
        ],
      },
      {
        id: 'destination',
        botText: "And where are you moving to?",
        input: 'address',
      },
      {
        id: 'destFloor',
        botText: "Which floor at the destination?",
        input: 'buttons',
        options: [
          { value: 'ground', label: 'Ground floor' },
          { value: '2-3-elev', label: '2nd–3rd, elevator' },
          { value: '2-3-no-elev', label: '2nd–3rd, no elevator' },
          { value: '4+-elev', label: '4th+, elevator' },
          { value: '4+-no-elev', label: '4th+, no elevator' },
        ],
      },
      {
        id: 'specialItems',
        botText: "Are any of these items part of the move?",
        input: 'multiselect',
        options: [
          { value: 'piano', label: 'Piano' },
          { value: 'safe', label: 'Safe (>500 lb)' },
          { value: 'pooltable', label: 'Pool table' },
          { value: 'artwork', label: 'Large artwork' },
        ],
      },
      {
        id: 'packing',
        botText: "Will you need packing service?",
        input: 'buttons',
        options: [
          { value: 'self', label: "I'll pack myself" },
          { value: 'partial', label: 'Partial packing' },
          { value: 'full', label: 'Full packing' },
        ],
      },
      {
        id: 'date',
        botText: "What's your preferred move date?",
        input: 'date',
      },
    ];

    const RENDERERS = {};

    RENDERERS.buttons = function (step, onAnswer) {
      const area = appendInputArea();
      for (const opt of step.options) {
        const btn = document.createElement('button');
        btn.className = 'choice-btn';
        btn.textContent = opt.label;
        btn.addEventListener('click', () => {
          area.remove();
          appendBubble('user', opt.label);
          onAnswer(opt.value);
        });
        area.appendChild(btn);
      }
    };

    RENDERERS.address = function (step, onAnswer) {
      const area = appendInputArea();
      const wrapper = document.createElement('div');
      wrapper.className = 'autocomplete';

      const input = document.createElement('input');
      input.type = 'text';
      input.className = 'text-input';
      input.placeholder = 'Start typing an address\u2026';
      wrapper.appendChild(input);

      const suggestions = document.createElement('div');
      suggestions.className = 'suggestions';
      suggestions.style.display = 'none';
      wrapper.appendChild(suggestions);

      // Manual submit button — escape hatch when autocomplete returns nothing
      const submitBtn = document.createElement('button');
      submitBtn.className = 'submit-btn';
      submitBtn.textContent = 'Use this address';
      submitBtn.style.display = 'none';

      area.appendChild(wrapper);
      area.appendChild(submitBtn);
      input.focus();

      let debounceTimer;
      let currentItems = [];
      let focusedIdx = -1;

      function selectItem(item) {
        const display = item.display_name;
        area.remove();
        appendBubble('user', display);
        onAnswer({
          display,
          coords: { lat: Number(item.lat), lng: Number(item.lon) },
        });
      }

      function highlightFocused() {
        const divs = suggestions.querySelectorAll('div');
        divs.forEach((d, i) => {
          if (i === focusedIdx) { d.classList.add('focused'); }
          else { d.classList.remove('focused'); }
        });
      }

      // Geocode the typed text and proceed if a result is found
      async function geocodeAndSubmit() {
        const q = input.value.trim();
        if (q.length < 3) return;
        submitBtn.disabled = true;
        submitBtn.textContent = 'Looking up\u2026';
        try {
          const url = `https://nominatim.openstreetmap.org/search?format=json&addressdetails=1&countrycodes=us&limit=1&q=${encodeURIComponent(q)}`;
          const res = await fetch(url, {
            headers: { 'User-Agent': 'Moovers-QuoteBot/1.0' },
          });
          const data = await res.json();
          if (Array.isArray(data) && data.length > 0) {
            selectItem(data[0]);
          } else {
            submitBtn.textContent = 'Address not found \u2014 try again';
            submitBtn.disabled = false;
          }
        } catch (e) {
          console.error('nominatim error', e);
          submitBtn.textContent = 'Lookup failed \u2014 try again';
          submitBtn.disabled = false;
        }
      }

      submitBtn.addEventListener('click', geocodeAndSubmit);

      input.addEventListener('input', () => {
        clearTimeout(debounceTimer);
        focusedIdx = -1;
        const q = input.value.trim();
        // Show manual submit when user has typed enough but might not get results
        submitBtn.style.display = q.length >= 3 ? '' : 'none';
        submitBtn.textContent = 'Use this address';
        submitBtn.disabled = false;
        if (q.length < 3) {
          suggestions.style.display = 'none';
          currentItems = [];
          return;
        }
        debounceTimer = setTimeout(async () => {
          try {
            const url = `https://nominatim.openstreetmap.org/search?format=json&addressdetails=1&countrycodes=us&limit=5&q=${encodeURIComponent(q)}`;
            const res = await fetch(url, {
              headers: { 'User-Agent': 'Moovers-QuoteBot/1.0' },
            });
            const data = await res.json();
            const items = Array.isArray(data) ? data : [];
            currentItems = items;
            renderSuggestions(items);
          } catch (e) {
            console.error('nominatim error', e);
          }
        }, 400);
      });

      input.addEventListener('keydown', (e) => {
        if (suggestions.style.display === 'none' || currentItems.length === 0) {
          if (e.key === 'Enter') { e.preventDefault(); geocodeAndSubmit(); }
          return;
        }
        if (e.key === 'ArrowDown') {
          e.preventDefault();
          focusedIdx = Math.min(focusedIdx + 1, currentItems.length - 1);
          highlightFocused();
        } else if (e.key === 'ArrowUp') {
          e.preventDefault();
          focusedIdx = Math.max(focusedIdx - 1, 0);
          highlightFocused();
        } else if (e.key === 'Enter') {
          e.preventDefault();
          if (focusedIdx >= 0 && focusedIdx < currentItems.length) {
            selectItem(currentItems[focusedIdx]);
          }
        } else if (e.key === 'Escape') {
          suggestions.style.display = 'none';
          focusedIdx = -1;
        }
      });

      function renderSuggestions(items) {
        while (suggestions.firstChild) suggestions.removeChild(suggestions.firstChild);
        if (items.length === 0) {
          suggestions.style.display = 'none';
          return;
        }
        items.forEach((item, idx) => {
          const display = item.display_name;
          const div = document.createElement('div');
          div.textContent = display;
          div.addEventListener('click', () => selectItem(item));
          div.addEventListener('mouseenter', () => {
            focusedIdx = idx;
            highlightFocused();
          });
          suggestions.appendChild(div);
        });
        suggestions.style.display = 'block';
        focusedIdx = -1;
      }
    };

    RENDERERS.multiselect = function (step, onAnswer) {
      const area = appendInputArea();
      const selected = new Set();

      for (const opt of step.options) {
        const btn = document.createElement('button');
        btn.className = 'choice-btn';
        btn.textContent = opt.label;
        btn.addEventListener('click', () => {
          if (selected.has(opt.value)) {
            selected.delete(opt.value);
            btn.classList.remove('selected');
          } else {
            selected.add(opt.value);
            btn.classList.add('selected');
          }
        });
        area.appendChild(btn);
      }

      const noneBtn = document.createElement('button');
      noneBtn.className = 'choice-btn';
      noneBtn.textContent = 'None of these';
      noneBtn.addEventListener('click', () => {
        area.remove();
        appendBubble('user', 'None');
        onAnswer([]);
      });
      area.appendChild(noneBtn);

      const doneBtn = document.createElement('button');
      doneBtn.className = 'submit-btn';
      doneBtn.textContent = 'Continue';
      doneBtn.addEventListener('click', () => {
        if (selected.size === 0) {
          area.remove();
          appendBubble('user', 'None');
          onAnswer([]);
          return;
        }
        const labels = step.options
          .filter(o => selected.has(o.value))
          .map(o => o.label)
          .join(', ');
        area.remove();
        appendBubble('user', labels);
        onAnswer([...selected]);
      });
      area.appendChild(doneBtn);
    };

    RENDERERS.date = function (step, onAnswer) {
      const area = appendInputArea();

      const today = new Date();
      today.setHours(0, 0, 0, 0);
      const maxDate = new Date(today.getFullYear(), today.getMonth() + 6, 1);
      let viewYear = today.getFullYear();
      let viewMonth = today.getMonth();
      let selected = null;

      const wrap = document.createElement('div');
      wrap.className = 'cal-wrap';
      area.appendChild(wrap);

      const cal = document.createElement('div');
      cal.className = 'calendar';
      wrap.appendChild(cal);

      const doneBtn = document.createElement('button');
      doneBtn.className = 'cal-submit';
      doneBtn.textContent = 'Continue';
      doneBtn.disabled = true;
      doneBtn.addEventListener('click', () => {
        if (!selected) return;
        const iso = `${selected.getFullYear()}-${String(selected.getMonth() + 1).padStart(2, '0')}-${String(selected.getDate()).padStart(2, '0')}`;
        const pretty = selected.toLocaleDateString('en-US', {
          weekday: 'long', month: 'long', day: 'numeric',
        });
        area.remove();
        appendBubble('user', pretty);
        onAnswer(iso);
      });
      wrap.appendChild(doneBtn);

      function renderCal() {
        while (cal.firstChild) cal.removeChild(cal.firstChild);

        // Header
        const header = document.createElement('div');
        header.className = 'cal-header';

        const prev = document.createElement('button');
        prev.className = 'cal-nav';
        prev.textContent = '‹';
        const firstOfView = new Date(viewYear, viewMonth, 1);
        const firstOfToday = new Date(today.getFullYear(), today.getMonth(), 1);
        prev.disabled = firstOfView <= firstOfToday;
        prev.addEventListener('click', () => {
          viewMonth--;
          if (viewMonth < 0) { viewMonth = 11; viewYear--; }
          renderCal();
        });

        const title = document.createElement('div');
        title.className = 'cal-title';
        title.textContent = firstOfView.toLocaleDateString('en-US', {
          month: 'long', year: 'numeric',
        });

        const next = document.createElement('button');
        next.className = 'cal-nav';
        next.textContent = '\u203a';
        const nextMonth = new Date(viewYear, viewMonth + 1, 1);
        next.disabled = nextMonth >= maxDate;
        next.addEventListener('click', () => {
          viewMonth++;
          if (viewMonth > 11) { viewMonth = 0; viewYear++; }
          renderCal();
        });

        header.appendChild(prev);
        header.appendChild(title);
        header.appendChild(next);
        cal.appendChild(header);

        // Weekday labels
        const weekdays = document.createElement('div');
        weekdays.className = 'cal-weekdays';
        for (const w of ['S', 'M', 'T', 'W', 'T', 'F', 'S']) {
          const d = document.createElement('div');
          d.textContent = w;
          weekdays.appendChild(d);
        }
        cal.appendChild(weekdays);

        // Day grid
        const grid = document.createElement('div');
        grid.className = 'cal-grid';

        const startDay = firstOfView.getDay();
        const daysInMonth = new Date(viewYear, viewMonth + 1, 0).getDate();

        for (let i = 0; i < startDay; i++) {
          const blank = document.createElement('div');
          blank.className = 'cal-day blank';
          grid.appendChild(blank);
        }

        for (let d = 1; d <= daysInMonth; d++) {
          const btn = document.createElement('button');
          btn.className = 'cal-day';
          btn.textContent = String(d);
          const cellDate = new Date(viewYear, viewMonth, d);
          if (cellDate < today) {
            btn.disabled = true;
          }
          if (selected &&
              selected.getFullYear() === viewYear &&
              selected.getMonth() === viewMonth &&
              selected.getDate() === d) {
            btn.classList.add('selected');
          }
          btn.addEventListener('click', () => {
            selected = cellDate;
            doneBtn.disabled = false;
            renderCal();
          });
          grid.appendChild(btn);
        }
        cal.appendChild(grid);
      }

      renderCal();
    };

    // --- Result screen helpers ---
    function el(tag, opts = {}) {
      const node = document.createElement(tag);
      if (opts.className) node.className = opts.className;
      if (opts.text != null) node.textContent = opts.text;
      if (opts.children) {
        for (const c of opts.children) node.appendChild(c);
      }
      return node;
    }

    function formatMoney(n) {
      return '$ ' + n.toLocaleString('en-US');
    }

    function formatRange(low, high) {
      return `${formatMoney(low)} – ${formatMoney(high)}`;
    }

    function breakdownRow(label, value) {
      return el('div', {
        className: 'row',
        children: [
          el('span', { className: 'lbl', text: label }),
          el('span', { text: typeof value === 'number' ? formatMoney(value) : value }),
        ],
      });
    }

    function renderResult(quote) {
      const headerBlock = el('div', {
        className: 'breakdown',
        children: [
          breakdownRow('Crew', `${quote.crew} movers`),
          breakdownRow('Estimated labor', `${quote.laborHours} hours`),
          breakdownRow(
            'Drive time',
            CONFIG.doubleDriveTime
              ? `${quote.driveHours} hours (${quote.miles} mi, round trip)`
              : `${quote.driveHours} hours (${quote.miles} mi)`
          ),
        ],
      });

      const breakdownBlock = el('div', { className: 'breakdown' });
      for (const row of quote.breakdown) {
        breakdownBlock.appendChild(breakdownRow(row.label, row.value));
      }

      const totalRow = el('div', { className: 'row' });
      const totalLabel = el('strong', { text: 'Total estimate' });
      const totalValue = el('strong', { text: formatRange(quote.totalLow, quote.totalHigh) });
      totalRow.appendChild(totalLabel);
      totalRow.appendChild(totalValue);
      const totalBlock = el('div', { className: 'breakdown', children: [totalRow] });

      const phoneBlock = buildPhoneCapture();

      const startOver = el('a', { className: 'start-over', text: 'Start Over' });
      startOver.addEventListener('click', () => {
        while (chatEl.firstChild) chatEl.removeChild(chatEl.firstChild);
        for (const k of Object.keys(answers)) delete answers[k];
        runConversation();
      });

      const result = el('div', {
        className: 'result',
        children: [
          el('div', { className: 'label', text: 'Your moving estimate' }),
          el('div', { className: 'total', text: formatRange(quote.totalLow, quote.totalHigh) }),
          el('hr'),
          headerBlock,
          el('hr'),
          breakdownBlock,
          el('hr'),
          totalBlock,
          phoneBlock,
          el('div', {
            className: 'disclaimer',
            text: 'This is a non-binding estimate. Final price depends on actual move time.',
          }),
          startOver,
        ],
      });

      chatEl.appendChild(result);
      scrollToBottom();
    }

    // Accepts 10-digit US numbers with any formatting, or 11 digits starting
    // with a country-code 1. Returns the normalized 10-digit string, or null.
    function validatePhone(raw) {
      const digits = raw.replace(/\D/g, '');
      if (digits.length === 10) return digits;
      if (digits.length === 11 && digits.startsWith('1')) return digits.slice(1);
      return null;
    }

    function formatPhone(digits) {
      return `(${digits.slice(0, 3)}) ${digits.slice(3, 6)}-${digits.slice(6)}`;
    }

    function buildPhoneCapture() {
      const block = el('div', { className: 'phone-capture' });
      const title = el('h3', { text: 'Want a human to confirm this price?' });
      const sub = el('p', {
        text: "Leave your number and a coordinator will call within 15 minutes to lock in your date.",
      });

      const form = el('div', { className: 'phone-form' });
      const input = document.createElement('input');
      input.type = 'tel';
      input.inputMode = 'numeric';
      input.autocomplete = 'tel';
      input.className = 'text-input';
      input.placeholder = '(555) 123-4567';
      input.setAttribute('aria-label', 'Phone number');

      const btn = document.createElement('button');
      btn.className = 'submit-btn';
      btn.textContent = 'Request call';

      form.appendChild(input);
      form.appendChild(btn);

      const errEl = el('div', { className: 'phone-error' });
      errEl.style.display = 'none';

      block.appendChild(title);
      block.appendChild(sub);
      block.appendChild(form);
      block.appendChild(errEl);

      function submit() {
        const normalized = validatePhone(input.value);
        if (!normalized) {
          errEl.textContent = 'Please enter a valid US phone number.';
          errEl.style.display = 'block';
          input.focus();
          return;
        }
        try { localStorage.setItem('moovers_phone', normalized); } catch (_) { /* private mode */ }
        while (block.firstChild) block.removeChild(block.firstChild);
        const success = el('div', { className: 'phone-success' });
        success.appendChild(el('strong', { text: 'Thanks! ' }));
        success.appendChild(document.createTextNode(
          `We'll call you at ${formatPhone(normalized)} within 15 minutes.`
        ));
        block.appendChild(success);
      }

      btn.addEventListener('click', submit);
      input.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') { e.preventDefault(); submit(); }
      });
      // Clear error as soon as the user starts fixing the input
      input.addEventListener('input', () => {
        if (errEl.style.display === 'block') errEl.style.display = 'none';
      });

      return block;
    }

    async function runConversation() {
      for (const step of STEPS) {
        await botSay(step.botText);
        const value = await new Promise(resolve => {
          RENDERERS[step.input](step, resolve);
        });
        answers[step.id] = value;
      }

      const miles = distanceMiles(answers.origin.coords, answers.destination.coords);

      await botSay('One moment — calculating your estimate…', 1500);

      const quote = calculateQuote({
        size: answers.size,
        originFloor: answers.originFloor,
        destFloor: answers.destFloor,
        miles,
        specialItems: answers.specialItems,
        packing: answers.packing,
        date: answers.date,
      });

      renderResult(quote);
    }

    // When embedded in an iframe, reduce padding and report height
    if (window.parent !== window) {
      document.documentElement.classList.add('embedded');
      let lastH = 0;
      function reportHeight() {
        const h = document.body.scrollHeight;
        if (h !== lastH) {
          lastH = h;
          window.parent.postMessage({ type: 'moovers-resize', height: h }, '*');
        }
      }
      new ResizeObserver(reportHeight).observe(document.body);
      new MutationObserver(reportHeight).observe(chatEl, { childList: true, subtree: true });
      reportHeight();
    }

    runConversation();
  </script>
</body>
