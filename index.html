<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Moovers — Instant Moving Quote</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&family=Inter:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #faf7f2;
      --surface: #ffffff;
      --border: #e7e5e4;
      --text: #1c1917;
      --text-muted: #78716c;
      --user-bg: #1c1917;
      --user-text: #faf7f2;
      --total: #166534;
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0; padding: 0;
      background: var(--bg); color: var(--text);
      font-family: 'Inter', system-ui, sans-serif;
      font-size: 14px;
      -webkit-font-smoothing: antialiased;
    }
    .brand {
      text-align: center;
      padding: 32px 0 16px;
      font-size: 11px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--text-muted);
    }
    .chat {
      max-width: 560px;
      margin: 0 auto;
      padding: 24px 24px 80px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      min-height: 70vh;
    }
    .bubble {
      max-width: 80%;
      padding: 14px 18px;
      border-radius: 14px;
      line-height: 1.55;
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-size: 17px;
      animation: slideUp 250ms ease-out both;
    }
    .bubble.bot {
      align-self: flex-start;
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
    }
    .bubble.user {
      align-self: flex-end;
      background: var(--user-bg);
      color: var(--user-text);
    }
    .typing {
      align-self: flex-start;
      padding: 14px 18px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      display: inline-flex;
      gap: 4px;
      animation: slideUp 250ms ease-out both;
    }
    .typing span {
      width: 6px; height: 6px; border-radius: 50%;
      background: var(--text-muted);
      animation: pulse 1.2s ease-in-out infinite;
    }
    .typing span:nth-child(2) { animation-delay: 0.15s; }
    .typing span:nth-child(3) { animation-delay: 0.3s; }
    @keyframes pulse {
      0%, 80%, 100% { opacity: 0.3; }
      40% { opacity: 1; }
    }
    @keyframes slideUp {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .input-area {
      align-self: stretch;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 4px;
      animation: slideUp 250ms ease-out both;
    }
    .choice-btn {
      padding: 10px 16px;
      background: transparent;
      color: var(--text);
      border: 1px solid var(--text);
      border-radius: 999px;
      font-family: 'Inter', sans-serif;
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      cursor: pointer;
      transition: background 150ms, color 150ms;
    }
    .choice-btn:hover { background: var(--text); color: var(--bg); }
    .choice-btn.selected { background: var(--text); color: var(--bg); }
    .text-input {
      flex: 1; min-width: 280px;
      padding: 12px 16px;
      border: 1px solid var(--border);
      background: var(--surface);
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      color: var(--text);
      border-radius: 8px;
      outline: none;
    }
    .text-input:focus { border-color: var(--text); }
    .autocomplete {
      position: relative;
      flex: 1;
      min-width: 280px;
    }
    .autocomplete .suggestions {
      position: absolute;
      top: 100%;
      left: 0; right: 0;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      margin-top: 4px;
      max-height: 240px;
      overflow-y: auto;
      z-index: 10;
    }
    .autocomplete .suggestions div {
      padding: 10px 16px;
      cursor: pointer;
      font-size: 13px;
    }
    .autocomplete .suggestions div:hover { background: #f5f1ea; }
    .submit-btn {
      padding: 10px 20px;
      background: var(--text);
      color: var(--bg);
      border: none;
      border-radius: 999px;
      font-family: 'Inter', sans-serif;
      font-size: 13px;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      cursor: pointer;
    }
    .result {
      margin-top: 32px;
      padding: 32px 24px;
      text-align: center;
      animation: slideUp 400ms ease-out both;
    }
    .result .label {
      font-size: 11px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--text-muted);
    }
    .result .total {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-weight: 600;
      font-size: 56px;
      color: var(--total);
      margin: 8px 0 24px;
      font-variant-numeric: tabular-nums;
    }
    .result hr {
      border: 0;
      border-top: 1px solid var(--border);
      margin: 16px auto;
      max-width: 320px;
    }
    .breakdown {
      max-width: 360px;
      margin: 0 auto;
      font-variant-numeric: tabular-nums;
    }
    .breakdown .row {
      display: flex;
      justify-content: space-between;
      padding: 6px 0;
      font-size: 14px;
    }
    .breakdown .row .lbl { color: var(--text-muted); }
    .disclaimer {
      margin-top: 24px;
      font-size: 12px;
      color: var(--text-muted);
      font-style: italic;
    }
    .start-over {
      display: inline-block;
      margin-top: 24px;
      color: var(--text);
      text-decoration: underline;
      cursor: pointer;
      font-size: 13px;
    }
  </style>
</head>
<body>
  <div class="brand">Moovers</div>
  <div class="chat" id="chat"></div>

  <script type="module">
    import { calculateQuote, distanceMiles, CONFIG } from './pricing.js';

    const chatEl = document.getElementById('chat');
    const answers = {};

    // --- UI primitives ---
    function appendBubble(role, text) {
      const div = document.createElement('div');
      div.className = `bubble ${role}`;
      div.textContent = text;
      chatEl.appendChild(div);
      scrollToBottom();
      return div;
    }
    function appendTyping() {
      const div = document.createElement('div');
      div.className = 'typing';
      for (let i = 0; i < 3; i++) {
        div.appendChild(document.createElement('span'));
      }
      chatEl.appendChild(div);
      scrollToBottom();
      return div;
    }
    function appendInputArea() {
      const div = document.createElement('div');
      div.className = 'input-area';
      chatEl.appendChild(div);
      scrollToBottom();
      return div;
    }
    function scrollToBottom() {
      window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
    }
    function delay(ms) { return new Promise(r => setTimeout(r, ms)); }
    async function botSay(text, typingMs = 600) {
      const t = appendTyping();
      await delay(typingMs);
      t.remove();
      return appendBubble('bot', text);
    }

    // --- Conversation engine ---
    const STEPS = [
      {
        id: 'size',
        botText: "Hi! I'll help you get a quick moving quote. What size is your current home?",
        input: 'buttons',
        options: [
          { value: 'studio', label: 'Studio' },
          { value: '1br', label: '1 BR' },
          { value: '2br', label: '2 BR' },
          { value: '3br', label: '3 BR' },
          { value: '4br', label: '4+ BR' },
        ],
      },
      {
        id: 'origin',
        botText: "Got it. What's the pickup address?",
        input: 'address',
      },
      {
        id: 'originFloor',
        botText: "Which floor is the pickup on, and is there an elevator?",
        input: 'buttons',
        options: [
          { value: 'ground', label: 'Ground floor' },
          { value: '2-3-elev', label: '2nd–3rd, elevator' },
          { value: '2-3-no-elev', label: '2nd–3rd, no elevator' },
          { value: '4+-elev', label: '4th+, elevator' },
          { value: '4+-no-elev', label: '4th+, no elevator' },
        ],
      },
      {
        id: 'destination',
        botText: "And where are you moving to?",
        input: 'address',
      },
      {
        id: 'destFloor',
        botText: "Which floor at the destination?",
        input: 'buttons',
        options: [
          { value: 'ground', label: 'Ground floor' },
          { value: '2-3-elev', label: '2nd–3rd, elevator' },
          { value: '2-3-no-elev', label: '2nd–3rd, no elevator' },
          { value: '4+-elev', label: '4th+, elevator' },
          { value: '4+-no-elev', label: '4th+, no elevator' },
        ],
      },
      {
        id: 'specialItems',
        botText: "Are any of these items part of the move?",
        input: 'multiselect',
        options: [
          { value: 'piano', label: 'Piano' },
          { value: 'safe', label: 'Safe (>500 lb)' },
          { value: 'pooltable', label: 'Pool table' },
          { value: 'artwork', label: 'Large artwork' },
        ],
      },
      {
        id: 'packing',
        botText: "Will you need packing service?",
        input: 'buttons',
        options: [
          { value: 'self', label: "I'll pack myself" },
          { value: 'partial', label: 'Partial packing' },
          { value: 'full', label: 'Full packing' },
        ],
      },
      {
        id: 'date',
        botText: "What's your preferred move date?",
        input: 'date',
      },
    ];

    const RENDERERS = {};

    RENDERERS.buttons = function (step, onAnswer) {
      const area = appendInputArea();
      for (const opt of step.options) {
        const btn = document.createElement('button');
        btn.className = 'choice-btn';
        btn.textContent = opt.label;
        btn.addEventListener('click', () => {
          area.remove();
          appendBubble('user', opt.label);
          onAnswer(opt.value);
        });
        area.appendChild(btn);
      }
    };

    RENDERERS.address = function (step, onAnswer) {
      const area = appendInputArea();
      const wrapper = document.createElement('div');
      wrapper.className = 'autocomplete';

      const input = document.createElement('input');
      input.type = 'text';
      input.className = 'text-input';
      input.placeholder = 'Start typing an address…';
      wrapper.appendChild(input);

      const suggestions = document.createElement('div');
      suggestions.className = 'suggestions';
      suggestions.style.display = 'none';
      wrapper.appendChild(suggestions);

      area.appendChild(wrapper);
      input.focus();

      let debounceTimer;
      input.addEventListener('input', () => {
        clearTimeout(debounceTimer);
        const q = input.value.trim();
        if (q.length < 3) {
          suggestions.style.display = 'none';
          return;
        }
        debounceTimer = setTimeout(async () => {
          try {
            const url = `https://photon.komoot.io/api/?q=${encodeURIComponent(q)}&limit=5&lang=en`;
            const res = await fetch(url);
            const data = await res.json();
            const items = (data.features || []).filter(f => {
              const c = f.properties && f.properties.country;
              return c === 'United States' || c === 'United States of America';
            });
            renderSuggestions(items);
          } catch (e) {
            console.error('photon error', e);
          }
        }, 250);
      });

      function renderSuggestions(items) {
        while (suggestions.firstChild) suggestions.removeChild(suggestions.firstChild);
        if (items.length === 0) {
          suggestions.style.display = 'none';
          return;
        }
        for (const item of items) {
          const p = item.properties;
          const display = [p.name, p.street, p.city, p.state, p.postcode]
            .filter(Boolean).join(', ');
          const div = document.createElement('div');
          div.textContent = display;
          div.addEventListener('click', () => {
            area.remove();
            appendBubble('user', display);
            onAnswer({
              display,
              coords: {
                lat: item.geometry.coordinates[1],
                lng: item.geometry.coordinates[0],
              },
            });
          });
          suggestions.appendChild(div);
        }
        suggestions.style.display = 'block';
      }
    };

    RENDERERS.multiselect = function (step, onAnswer) {
      const area = appendInputArea();
      const selected = new Set();

      for (const opt of step.options) {
        const btn = document.createElement('button');
        btn.className = 'choice-btn';
        btn.textContent = opt.label;
        btn.addEventListener('click', () => {
          if (selected.has(opt.value)) {
            selected.delete(opt.value);
            btn.classList.remove('selected');
          } else {
            selected.add(opt.value);
            btn.classList.add('selected');
          }
        });
        area.appendChild(btn);
      }

      const noneBtn = document.createElement('button');
      noneBtn.className = 'choice-btn';
      noneBtn.textContent = 'None of these';
      noneBtn.addEventListener('click', () => {
        area.remove();
        appendBubble('user', 'None');
        onAnswer([]);
      });
      area.appendChild(noneBtn);

      const doneBtn = document.createElement('button');
      doneBtn.className = 'submit-btn';
      doneBtn.textContent = 'Continue';
      doneBtn.addEventListener('click', () => {
        if (selected.size === 0) {
          area.remove();
          appendBubble('user', 'None');
          onAnswer([]);
          return;
        }
        const labels = step.options
          .filter(o => selected.has(o.value))
          .map(o => o.label)
          .join(', ');
        area.remove();
        appendBubble('user', labels);
        onAnswer([...selected]);
      });
      area.appendChild(doneBtn);
    };

    RENDERERS.date = function (step, onAnswer) {
      const area = appendInputArea();

      const input = document.createElement('input');
      input.type = 'date';
      input.className = 'text-input';
      const today = new Date().toISOString().slice(0, 10);
      input.min = today;
      input.value = today;

      const btn = document.createElement('button');
      btn.className = 'submit-btn';
      btn.textContent = 'Continue';
      btn.addEventListener('click', () => {
        if (!input.value) return;
        const pretty = new Date(input.value + 'T12:00:00').toLocaleDateString('en-US', {
          weekday: 'long', month: 'long', day: 'numeric',
        });
        area.remove();
        appendBubble('user', pretty);
        onAnswer(input.value);
      });

      area.appendChild(input);
      area.appendChild(btn);
    };

    // --- Result screen helpers ---
    function el(tag, opts = {}) {
      const node = document.createElement(tag);
      if (opts.className) node.className = opts.className;
      if (opts.text != null) node.textContent = opts.text;
      if (opts.children) {
        for (const c of opts.children) node.appendChild(c);
      }
      return node;
    }

    function formatMoney(n) {
      return '$ ' + n.toLocaleString('en-US');
    }

    function breakdownRow(label, value) {
      return el('div', {
        className: 'row',
        children: [
          el('span', { className: 'lbl', text: label }),
          el('span', { text: typeof value === 'number' ? formatMoney(value) : value }),
        ],
      });
    }

    function renderResult(quote) {
      const headerBlock = el('div', {
        className: 'breakdown',
        children: [
          breakdownRow('Crew', `${quote.crew} movers`),
          breakdownRow('Estimated labor', `${quote.laborHours} hours`),
          breakdownRow(
            'Drive time',
            CONFIG.doubleDriveTime
              ? `${quote.driveHours} hours (${quote.miles} mi, round trip)`
              : `${quote.driveHours} hours (${quote.miles} mi)`
          ),
        ],
      });

      const breakdownBlock = el('div', { className: 'breakdown' });
      for (const row of quote.breakdown) {
        breakdownBlock.appendChild(breakdownRow(row.label, row.value));
      }

      const totalRow = el('div', { className: 'row' });
      const totalLabel = el('strong', { text: 'Total estimate' });
      const totalValue = el('strong', { text: formatMoney(quote.total) });
      totalRow.appendChild(totalLabel);
      totalRow.appendChild(totalValue);
      const totalBlock = el('div', { className: 'breakdown', children: [totalRow] });

      const startOver = el('a', { className: 'start-over', text: 'Start Over' });
      startOver.addEventListener('click', () => {
        while (chatEl.firstChild) chatEl.removeChild(chatEl.firstChild);
        for (const k of Object.keys(answers)) delete answers[k];
        runConversation();
      });

      const result = el('div', {
        className: 'result',
        children: [
          el('div', { className: 'label', text: 'Your moving estimate' }),
          el('div', { className: 'total', text: formatMoney(quote.total) }),
          el('hr'),
          headerBlock,
          el('hr'),
          breakdownBlock,
          el('hr'),
          totalBlock,
          el('div', {
            className: 'disclaimer',
            text: 'This is a non-binding estimate. Final price depends on actual move time.',
          }),
          startOver,
        ],
      });

      chatEl.appendChild(result);
      scrollToBottom();
    }

    async function runConversation() {
      for (const step of STEPS) {
        await botSay(step.botText);
        const value = await new Promise(resolve => {
          RENDERERS[step.input](step, resolve);
        });
        answers[step.id] = value;
      }

      const miles = distanceMiles(answers.origin.coords, answers.destination.coords);

      await botSay('One moment — calculating your estimate…', 1500);

      const quote = calculateQuote({
        size: answers.size,
        originFloor: answers.originFloor,
        destFloor: answers.destFloor,
        miles,
        specialItems: answers.specialItems,
        packing: answers.packing,
        date: answers.date,
      });

      renderResult(quote);
    }

    runConversation();
  </script>
</body>
</html>
