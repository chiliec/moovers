<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Moovers — Instant Moving Quote</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&family=Inter:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #faf7f2;
      --surface: #ffffff;
      --border: #e7e5e4;
      --text: #1c1917;
      --text-muted: #78716c;
      --user-bg: #1c1917;
      --user-text: #faf7f2;
      --total: #166534;
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0; padding: 0;
      background: var(--bg); color: var(--text);
      font-family: 'Inter', system-ui, sans-serif;
      font-size: 14px;
      -webkit-font-smoothing: antialiased;
    }
    .brand {
      text-align: center;
      padding: 32px 0 16px;
      font-size: 11px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--text-muted);
    }
    .chat {
      max-width: 560px;
      margin: 0 auto;
      padding: 24px 24px 80px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      min-height: 70vh;
    }
    .bubble {
      max-width: 80%;
      padding: 14px 18px;
      border-radius: 14px;
      line-height: 1.55;
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-size: 17px;
      animation: slideUp 250ms ease-out both;
    }
    .bubble.bot {
      align-self: flex-start;
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
    }
    .bubble.user {
      align-self: flex-end;
      background: var(--user-bg);
      color: var(--user-text);
    }
    .typing {
      align-self: flex-start;
      padding: 14px 18px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      display: inline-flex;
      gap: 4px;
      animation: slideUp 250ms ease-out both;
    }
    .typing span {
      width: 6px; height: 6px; border-radius: 50%;
      background: var(--text-muted);
      animation: pulse 1.2s ease-in-out infinite;
    }
    .typing span:nth-child(2) { animation-delay: 0.15s; }
    .typing span:nth-child(3) { animation-delay: 0.3s; }
    @keyframes pulse {
      0%, 80%, 100% { opacity: 0.3; }
      40% { opacity: 1; }
    }
    @keyframes slideUp {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .input-area {
      align-self: stretch;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 4px;
      animation: slideUp 250ms ease-out both;
    }
    .choice-btn {
      padding: 10px 16px;
      background: transparent;
      color: var(--text);
      border: 1px solid var(--text);
      border-radius: 999px;
      font-family: 'Inter', sans-serif;
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      cursor: pointer;
      transition: background 150ms, color 150ms;
    }
    .choice-btn:hover { background: var(--text); color: var(--bg); }
    .choice-btn.selected { background: var(--text); color: var(--bg); }
    .text-input {
      flex: 1; min-width: 280px;
      padding: 12px 16px;
      border: 1px solid var(--border);
      background: var(--surface);
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      color: var(--text);
      border-radius: 8px;
      outline: none;
    }
    .text-input:focus { border-color: var(--text); }
    .autocomplete {
      position: relative;
      flex: 1;
      min-width: 280px;
    }
    .autocomplete .suggestions {
      position: absolute;
      top: 100%;
      left: 0; right: 0;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      margin-top: 4px;
      max-height: 240px;
      overflow-y: auto;
      z-index: 10;
    }
    .autocomplete .suggestions div {
      padding: 10px 16px;
      cursor: pointer;
      font-size: 13px;
    }
    .autocomplete .suggestions div:hover { background: #f5f1ea; }
    .submit-btn {
      padding: 10px 20px;
      background: var(--text);
      color: var(--bg);
      border: none;
      border-radius: 999px;
      font-family: 'Inter', sans-serif;
      font-size: 13px;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      cursor: pointer;
    }
    .result {
      margin-top: 32px;
      padding: 32px 24px;
      text-align: center;
      animation: slideUp 400ms ease-out both;
    }
    .result .label {
      font-size: 11px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--text-muted);
    }
    .result .total {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-weight: 600;
      font-size: 56px;
      color: var(--total);
      margin: 8px 0 24px;
      font-variant-numeric: tabular-nums;
    }
    .result hr {
      border: 0;
      border-top: 1px solid var(--border);
      margin: 16px auto;
      max-width: 320px;
    }
    .breakdown {
      max-width: 360px;
      margin: 0 auto;
      font-variant-numeric: tabular-nums;
    }
    .breakdown .row {
      display: flex;
      justify-content: space-between;
      padding: 6px 0;
      font-size: 14px;
    }
    .breakdown .row .lbl { color: var(--text-muted); }
    .disclaimer {
      margin-top: 24px;
      font-size: 12px;
      color: var(--text-muted);
      font-style: italic;
    }
    .start-over {
      display: inline-block;
      margin-top: 24px;
      color: var(--text);
      text-decoration: underline;
      cursor: pointer;
      font-size: 13px;
    }
  </style>
</head>
<body>
  <div class="brand">Moovers</div>
  <div class="chat" id="chat"></div>

  <script type="module">
    import { calculateQuote, distanceMiles } from './pricing.js';
    // Conversation engine and UI logic added in next tasks.
    console.log('moovers ready', { calculateQuote, distanceMiles });
  </script>
</body>
</html>
